name: Update papers with auto audit

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/**'
      - 'index.html'
      - 'updates.html'
      - 'paper.html'
      - 'style.css'
      - 'script.js'
      - 'enhancements.css'
      - 'enhancements.js'
      - 'author_graph_interactions.css'
      - 'author_graph_interactions.js'
      - 'graph_label_cleanup.js'
      - '.github/workflows/update-papers.yml'

permissions:
  contents: write

concurrency:
  group: update-paper-candidates
  cancel-in-progress: false

jobs:
  update:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Search public scholarly sources
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: python scripts/update_candidates.py --since-days 730 --rows 30 --min-score 7

      - name: Search targeted mmWave seeds
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: python scripts/update_mmwave_seed_candidates.py

      - name: Run automatic curation-agent audit
        run: python scripts/agent_audit.py

      - name: Validate mmWave allowlist
        run: python scripts/validate_mmwave_track.py

      - name: Rebuild bilingual website
        run: python scripts/build_site.py

      - name: Apply progressive UI enhancements
        run: python scripts/apply_ui_enhancements.py

      - name: Download open PDFs when available
        run: python scripts/download_pdfs.py
        continue-on-error: true

      - name: Commit changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [[ -n "$(git status --porcelain)" ]]; then
            git add data/papers.json data/focus_papers.json data/mmwave_papers.json data/candidates.json data/last_update.json index.html updates.html paper.html papers/*.html pdfs || true
            git commit -m 'Auto-update acoustic-optics paper library [skip ci]'
            git push
          else
            echo 'No changes to commit.'
          fi
